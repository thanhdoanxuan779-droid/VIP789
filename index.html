<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tool Lô</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<style>
.title{
  color:#7dd3fc;
  font-weight:700;
  text-align:center;
  margin:10px 0;
}

body{
  background:#0b141a;
  color:#e6edf3;
  font-family:sans-serif;
}

/* tabs */

.tabs{
  display:flex;
  gap:8px;
  margin-bottom:10px;
  overflow-x:auto;
}

.tab-btn{
  flex:1;
  padding:12px 4px;
  text-align:center;
  border-radius:10px;
  background:#1b2a32;
  font-weight:700;
  font-size:15px;
  color:#cfe6ee;
}

.tab-btn.active{
  background:#144d57;
  color:#fff;
}

.tab{display:none}
.tab.active{display:block}

/* box */

.box{
  background:#111b21;
  border:1px solid #22343c;
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
}

/* inputs layout */

.inputs{
  display:flex;
  gap:8px;
  margin-bottom:8px;
}

/* input + textarea */

input,textarea{
  width:100%;
  height:52px;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid #2a3f47;
  background:#0b141a;
  color:#e6edf3;
  font-size:17px;
  font-weight:700;
  text-align:center;
  box-sizing:border-box;
}

textarea{
  height:58px;
  resize:none;
}

/* result */

.result{
  word-break:break-word;
  font-weight:800;
  color:#22c55e;
  margin-top:6px;
}
textarea[id*="kq"],
#ghep_kq,
#xien_result {
  color:#22c55e;
  font-weight:800;
  letter-spacing:1px;
}
.count{
  font-size:13px;
  color:#8fa6ad;
  text-align:center;
}

/* buttons */

.actions{
  display:none;
  gap:8px;
  margin-top:8px;
}

button{
  flex:1;
  height:48px;
  border:none;
  border-radius:12px;
  font-weight:700;
  font-size:15px;
}

.copy{
  background:#1f8a99;
  color:#fff;
}

.del{
  background:#7a2e2e;
  color:#fff;
}

/* tab2 textarea */

#tab2 textarea{
  min-height:52px;
  font-size:15px;
}
</style>
</head>

<body>

<div class="container">

<div id="tab1" class="tab active">
<div class="title">TẠO DÀN VIP</div>
</div>

<div id="tab2" class="tab">
<div class="title">GHÉP TRÙNG</div>
</div>

<div id="tab5" class="tab">
<div class="title">CHÉM DÀN</div>
</div>
<script>
let startX = 0

document.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX
})

document.addEventListener('touchend', e => {
  let endX = e.changedTouches[0].clientX
  let diff = endX - startX

  if(Math.abs(diff) < 50) return // vuốt ngắn bỏ qua

  let tabs = document.querySelectorAll('.tab')
  let current = [...tabs].findIndex(t => t.classList.contains('active'))

  if(diff < 0 && current < tabs.length - 1){
    showTab(current + 1) // vuốt trái
  }

  if(diff > 0 && current > 0){
    showTab(current - 1) // vuốt phải
  }
})
const MIN=4, MAX=40
const ALL_NUMS = Array.from({length:100},(_,i)=>i.toString().padStart(2,'0'))
const KEY='tool_lo1_fix'

function showTab(i){
  const tabs = document.querySelectorAll('.tab')

  tabs.forEach(t => t.classList.remove('active'))

  if(tabs[i]){
    tabs[i].classList.add('active')
  }
}
/* SAVE */
function save(){
  const d = {}

  // Lưu toàn bộ input + textarea theo id
  document.querySelectorAll('input,textarea').forEach(e=>{
    if(e.id) d[e.id] = e.value
  })

  // Các phần kết quả còn dùng
  d.gr = document.getElementById('gr')?.innerText || ''
  d.gc = document.getElementById('gc')?.innerText || ''

  d.random_result = document.getElementById('random_result')?.innerText || ''
  d.random_count_text = document.getElementById('random_count_text')?.innerText || ''

  d.chem_result = document.getElementById('chem_result')?.innerText || ''
  d.chem_count  = document.getElementById('chem_count')?.innerText || ''

  // Lưu lại
  localStorage.setItem(KEY, JSON.stringify(d))
}
function load(){
  const d = JSON.parse(localStorage.getItem(KEY) || '{}')

  // Restore input + textarea
  Object.keys(d).forEach(id=>{
    const e = document.getElementById(id)
    if(!e) return

    if(e.tagName === 'INPUT' || e.tagName === 'TEXTAREA'){
      e.value = d[id]
    }
  })
if(d.ghep_kq){
  document.getElementById('ghep_kq').value = d.ghep_kq
  document.getElementById('ghep_count').innerText = d.ghep_count || ''
  document.getElementById('ghep_actions').style.display = 'flex'
}else{
  document.getElementById('ghep_actions').style.display = 'none'
}
  /* ===== TAB 2 – GHÉP TRÙNG ===== */
  if(d.gr){
    document.getElementById('gr').innerText = d.gr
    document.getElementById('gc').innerText = d.gc || ''
    document.getElementById('gact').style.display = 'flex'
  }else{
    document.getElementById('gact').style.display = 'none'
  }

  /* ===== TAB 5 – RANDOM ===== */
  if(d.random_result){
    document.getElementById('random_result').innerText = d.random_result
    document.getElementById('random_actions').style.display = 'flex'
  }else{
    document.getElementById('random_actions').style.display = 'none'
  }

  if(d.random_count_text){
    document.getElementById('random_count_text').innerText = d.random_count_text
  }

  /* ===== TAB 5 – CHÉM ===== */
  if(d.chem_result){
    document.getElementById('chem_result').innerText = d.chem_result
    document.getElementById('chem_actions').style.display = 'flex'
  }else{
    document.getElementById('chem_actions').style.display = 'none'
  }

  if(d.chem_count){
    document.getElementById('chem_count').innerText = d.chem_count
  }
}
for(let i=1;i<=MAX;i++){
  const r = document.getElementById('r'+i)
  const act = document.getElementById('act'+i)

  if(r && act){
    if(r.innerText && r.innerText.trim() !== ''){
      act.style.display = 'flex'
    }else{
      act.style.display = 'none'
    }
  }
}
setTimeout(()=>{
  for(let i=1;i<=MAX;i++){
    if(document.getElementById('r'+i)?.innerText){
      document.getElementById('act'+i).style.display='flex'
    }
    calc1(i)
  }
},0)
/* TOOL */
const digits=id=>{
  const el=document.getElementById(id)
  if(!el) return []
  return (el.value||'')
    .replace(/\D/g,'')
    .split('')
    .map(Number)
}
const pairs=id=>{
  const el=document.getElementById(id)
  if(!el) return []

  let nums = (el.value.match(/\d{2}/g) || [])

  nums = nums
    .map(x=>parseInt(x))
    .filter(x=>x>=0 && x<=99)
    .map(x=>x.toString().padStart(2,'0'))

  return [...new Set(nums)]
}

/* ================= TAB 1 – TẠO DÀN VIP ================= */
function gen(ch,tg,dau,duoi){
  return ALL_NUMS.filter(num=>{
    const a = +num[0]
    const b = +num[1]

    if(ch.length && !(ch.includes(a)||ch.includes(b))) return false
    if(tg.length && !tg.includes((a+b)%10)) return false
    if(dau.length && !dau.includes(a)) return false
    if(duoi.length && !duoi.includes(b)) return false

    return true
  })
}

function calc1(i){

  const a = digits('a'+i)
  const b = digits('b'+i)

  const ch = digits('ch'+i)
  const to = digits('to'+i)
  const bo = pairs('bo'+i)

  const da = digits('da'+i)
  const du = digits('du'+i)

  const add = pairs('add'+i)
  const sub = pairs('sub'+i)

  const locham = digits('locham'+i)
  const lotong = digits('lotong'+i)
  const lobo = pairs('lobo'+i)

  const lodau = digits('lodau'+i)
  const loduoi = digits('loduoi'+i)
  const addch = digits('addch'+i)
  const addto = digits('addto'+i)
  const addbo = pairs('addbo'+i)

const adddau = digits('adddau'+i)
const addduoi = digits('addduoi'+i)
const ghepcham = digits('ghepcham'+i)
const ghepto   = digits('ghepto'+i)
const gheptrong = digits('gheptrong'+i)
const ghepngoai = digits('ghepngoai'+i)
const hasFilter =
  a.length || b.length ||
  ch.length || to.length ||
  bo.length ||
  da.length || du.length ||
  locham.length || lotong.length || lobo.length ||
  lodau.length || loduoi.length

  const addSet = add.length
    ? [...new Set(add.map(x => String(x).padStart(2,'0')))]
    : []

  let base = []

  // ===== CHỌN BASE =====
if(!hasFilter && !addSet.length){
  base = [] // không có gì → không sinh 100 số
}
else if(addSet.length && !hasFilter){
  base = [...addSet] // chỉ add
}
else{
  base = [...ALL_NUMS] // có filter → chạy từ ALL
}
  // ===== FILTER FUNCTION =====
  const pass = (n)=>{
    const x = +n[0]
    const y = +n[1]

    // ===== A / B =====

// có cả A và B → ghép cặp
if(a.length && b.length){
  let ok = false

  for(let A of a){
    for(let B of b){
      if(n === `${A}${B}` || n === `${B}${A}`){
        ok = true
        break
      }
    }
    if(ok) break
  }

  if(!ok) return false
}

    if(ch.length && !(ch.includes(x)||ch.includes(y))) return false
    if(to.length && !to.includes((x+y)%10)) return false

    if(da.length && !da.includes(x)) return false
    if(du.length && !du.includes(y)) return false

    if(lodau.length && lodau.includes(x)) return false
    if(loduoi.length && loduoi.includes(y)) return false

    if(locham.length && (locham.includes(x)||locham.includes(y))) return false
    if(lotong.length && lotong.includes((x+y)%10)) return false

    if(sub.length && sub.includes(n)) return false

    return true
  }

  // ===== APPLY FILTER =====
  let r = base.filter(pass)

  // ===== BỘ =====
  if(bo.length){
    const bong = d => (d <= 4) ? String(+d + 5) : String(+d - 5)

    r = r.filter(n=>{
      return bo.some(b=>{
        const a=b[0], c=b[1]
        const set=[
          a+c,c+a,
          bong(a)+bong(c),bong(c)+bong(a),
          a+bong(c),bong(c)+a,
          c+bong(a),bong(a)+c
        ]
        return set.includes(n)
      })
    })
  }

  if(lobo.length){
    const bong = d => (d <= 4) ? String(+d + 5) : String(+d - 5)

    r = r.filter(n=>{
      return !lobo.some(b=>{
        const a=b[0], c=b[1]
        const set=[
          a+c,c+a,
          bong(a)+bong(c),bong(c)+bong(a),
          a+bong(c),bong(c)+a,
          c+bong(a),bong(a)+c
        ]
        return set.includes(n)
      })
    })
  }

  // ===== ADD CHUẨN 2 CHẾ ĐỘ =====
if(addSet.length){

  if(!hasFilter){
    // chỉ add
    r = [...addSet]
  }
  else if(addSet.length <= 2){
    // thêm số → KHÔNG filter
    r = [...new Set([...r, ...addSet])]
  } 
  else {
    // add là dàn → lọc giao
    r = r.filter(x => addSet.includes(x))
  }

}
// ===== THÊM FILTER (OR) =====
if(addch.length || addto.length || addbo.length || adddau.length || addduoi.length){

  const extra = ALL_NUMS.filter(n=>{
    const x = +n[0]
    const y = +n[1]

    if(addch.length && (addch.includes(x) || addch.includes(y))) return true
    if(addto.length && addto.includes((x+y)%10)) return true
    if(adddau.length && adddau.includes(x)) return true
    if(addduoi.length && addduoi.includes(y)) return true

    if(addbo.length){
      const bong = d => (d <= 4) ? String(+d + 5) : String(+d - 5)

      for(let b of addbo){
        const a=b[0], c=b[1]
        const set=[
          a+c,c+a,
          bong(a)+bong(c),bong(c)+bong(a),
          a+bong(c),bong(c)+a,
          c+bong(a),bong(a)+c
        ]
        if(set.includes(n)) return true
      }
    }

    return false
  })

  // gộp thêm (OR)
  r = [...new Set([...r, ...extra])]
}
  r = [...new Set(r)]
    .sort((a,b)=>parseInt(a)-parseInt(b))

  document.getElementById('r'+i).innerText = r.join(',')
  document.getElementById('c'+i).innerText = r.length ? r.length+' số' : ''
  document.getElementById('act'+i).style.display = r.length ? 'flex' : 'none'

  auto1()
  save()
}
function resetRow(i){

  const ids = [
    'a','b','ch','to','bo',
    'da','du','add','sub',
    'locham','lotong','lobo',
    'lodau','loduoi'
  ]

  ids.forEach(id=>{
    const el = document.getElementById(id+i)
    if(el) el.value = ''
  })

  // xoá kết quả
  document.getElementById('r'+i).innerText = ''
  document.getElementById('c'+i).innerText = ''

  // ẩn nút copy/xoá
  const act = document.getElementById('act'+i)
  if(act) act.style.display = 'none'

  // lưu lại trạng thái
  save()
}
function out1(i,a){
  document.getElementById('r'+i).innerText=a.join(',')
  document.getElementById('c'+i).innerText=a.length?a.length+' số':''
  document.querySelector('#b1_'+i+' .actions').style.display=a.length?'flex':'none'
}

function auto1(){

  let last = 0; // 🔥 đổi từ MIN → 0

  for(let i=1;i<=MAX;i++){

    const ch  = document.getElementById('ch'+i)?.value.trim()
    const to  = document.getElementById('to'+i)?.value.trim()
    const da  = document.getElementById('da'+i)?.value.trim()
    const du  = document.getElementById('du'+i)?.value.trim()
    const add = document.getElementById('add'+i)?.value.trim()
    const sub = document.getElementById('sub'+i)?.value.trim()

    if(ch || to || da || du || add || sub){
      last = i
    }
  }

  // 🔥 xử lý đúng trường hợp rỗng
  if(last === 0){
    last = MIN
  }else{
    last = Math.min(MAX, last + 1)
  }

  for(let i=1;i<=MAX;i++){
    const box = document.getElementById('b1_'+i)
    if(box){
      box.style.display = i <= last ? 'block' : 'none'
    }
  }
}
function render1(){
  let h = '<div class="title">TẠO DÀN VIP</div>';

  for(let i=1;i<=MAX;i++){
    h+=`
    <div class="box" id="b1_${i}" style="display:${i<=MIN?'block':'none'}">
      <div class="title">DÀN ${i}</div>

      <!-- HÀNG 1 -->
      <div class="inputs">
        <input id="a${i}" placeholder="Số A" oninput="calc1(${i})">
        <input id="b${i}" placeholder="Số B" oninput="calc1(${i})">
      </div>

      <!-- HÀNG 2 -->
      <div class="inputs">
        <input id="ch${i}" placeholder="Chạm" oninput="calc1(${i})">
        <input id="to${i}" placeholder="Tổng" oninput="calc1(${i})">
        <input id="bo${i}" placeholder="Bộ" oninput="calc1(${i})">
      </div>

      <!-- HÀNG 3 -->
      <div class="inputs">
        <input id="da${i}" placeholder="Đầu" oninput="calc1(${i})">
        <input id="du${i}" placeholder="Đuôi" oninput="calc1(${i})">
      </div>

      <!-- HÀNG 4 -->
      <div class="inputs">
        <input id="add${i}" placeholder="Thêm " oninput="calc1(${i})">
        <input id="sub${i}" placeholder="Bỏ" oninput="calc1(${i})">
      </div>

      <!-- HÀNG 5 -->
      <div class="inputs">
        <input id="locham${i}" placeholder="Loại Chạm" oninput="calc1(${i})">
        <input id="lotong${i}" placeholder="Loại Tổng" oninput="calc1(${i})">
        <input id="lobo${i}" placeholder="Loại Bộ" oninput="calc1(${i})">
      </div>

      <!-- HÀNG 6 -->
      <div class="inputs">
        <input id="lodau${i}" placeholder="Loại Đầu" oninput="calc1(${i})">
        <input id="loduoi${i}" placeholder="Loại Đuôi" oninput="calc1(${i})">
      </div>
<div class="inputs">
  <input id="addch${i}" placeholder="Thêm Chạm" oninput="calc1(${i})">
  <input id="addto${i}" placeholder="Thêm Tổng" oninput="calc1(${i})">
  <input id="addbo${i}" placeholder="Thêm Bộ" oninput="calc1(${i})">
</div>
<div class="inputs">
  <input id="adddau${i}" placeholder="Thêm Đầu" oninput="calc1(${i})">
  <input id="addduoi${i}" placeholder="Thêm Đuôi" oninput="calc1(${i})">
</div>
      <div class="result" id="r${i}"></div>
      <div class="count" id="c${i}"></div>
<div class="actions" id="act${i}" style="display:none">
  <button class="copy"
    onclick="navigator.clipboard.writeText(document.getElementById('r'+${i}).innerText)">
    COPY
  </button>

  <button class="del" onclick="resetRow(${i})">
    XOÁ
  </button>
</div>
</div>
    `;
  }

  tab1.innerHTML = h;
}
/* ================= TAB 2 – GHÉP TRÙNG ================= */
function render2(){
  let h='<div class="title">GHÉP TRÙNG</div>'
  for(let i=1;i<=MAX;i++){
    h+=`
    <div class="box" id="gbox${i}">
      <div class="title">DÀN ${i}</div>
      <textarea id="g${i}" oninput="calcG()"></textarea>
      <div class="actions" style="display:flex">
        <button class="copy" onclick="pasteG(${i})">DÁN</button>
        <button class="del" onclick="document.getElementById('g${i}').value='';calcG()">XOÁ</button>
      </div>
    </div>`
  }
  h+=`
  <div class="box">
    <div class="title">KẾT QUẢ</div>
    <div class="result" id="gr"></div>
    <div class="count" id="gc"></div>
    <div class="actions" id="gact">
  <button class="copy" onclick="navigator.clipboard.writeText(document.getElementById('gr').innerText)">COPY</button>
  <button class="copy" onclick="calcUnion()">GHÉP DÀN</button>
<button class="copy" onclick="calcG()">GHÉP TRÙNG</button>
<button class="copy" onclick="removeAllDuplicate()">LOẠI TRÙNG</button>
<button class="del" onclick="clearG()">XOÁ</button>
</div>
<div id="diffButtons" style="display:flex;flex-wrap:wrap;margin-top:6px"></div>
  </div>`
  tab2.innerHTML=h
  autoG()
}

async function pasteG(i){
  const t=await navigator.clipboard.readText()
  document.getElementById('g'+i).value=[...new Set(t.match(/\d{2}/g)||[])].join(',')
  calcG()
}

function calcG(){

  let sets = []

  for(let i=1;i<=MAX;i++){
    const v = document.getElementById('g'+i).value.trim()
    if(v){
      sets.push(
        [...new Set(v.match(/\d{2}/g) || [])]
      )
    }
  }

  if(sets.length < 2){
  document.getElementById('gr').innerText = ''
  document.getElementById('gc').innerText = ''
  document.getElementById('gact').style.display = 'none'
  document.getElementById('diffButtons').innerHTML = ''   // thêm dòng này
  save()
  return
}

  // intersection chuẩn
  let r = sets[0]

  for(let i=1;i<sets.length;i++){
    const setB = new Set(sets[i])
    r = r.filter(x => setB.has(x))
  }

  r = [...new Set(r)].sort()

  document.getElementById('gr').innerText = r.join(',')
  document.getElementById('gc').innerText = r.length ? r.length + ' số' : ''
  document.getElementById('gact').style.display = r.length ? 'flex' : 'none'

  generateDiffButtons()
  autoG()
  save()
}
function calcUnion(){

  let all = []

  for(let i=1;i<=MAX;i++){
    const v = document.getElementById('g'+i).value.trim()
    if(v){
      all.push(...(v.match(/\d{2}/g) || []))
    }
  }

  let r = [...new Set(all)]
  .map(x=>parseInt(x))
  .sort((a,b)=>a-b)
  .map(x=>x.toString().padStart(2,'0'))

  document.getElementById('gr').innerText = r.join(',')
  document.getElementById('gc').innerText =
    r.length ? r.length + ' số' : ''

  document.getElementById('gact').style.display =
    r.length ? 'flex' : 'none'

  generateDiffButtons()
  save()
}
function removeAllDuplicate(){

  let all = []

  for(let i=1;i<=MAX;i++){
    const v = document.getElementById('g'+i).value.trim()
    if(v){
      all.push(...(v.match(/\d{2}/g) || []))
    }
  }

  let count = {}

  all.forEach(n=>{
    count[n] = (count[n] || 0) + 1
  })

  let result = Object.keys(count)
    .filter(n => count[n] === 1)
    .map(x=>parseInt(x))
    .sort((a,b)=>a-b)
    .map(x=>x.toString().padStart(2,'0'))

  document.getElementById('gr').innerText = result.join(',')
  document.getElementById('gc').innerText =
    result.length ? result.length + ' số' : '0 số'

  // LUÔN HIỆN NÚT
  document.getElementById('gact').style.display = 'flex'

  save()
}
function autoG(){

  let last = 0  // 🔥 không dùng MIN ở đây

  for(let i=1;i<=MAX;i++){
    const el = document.getElementById('g'+i)
    if(el && el.value.trim()){
      last = i   // chỉ lấy dàn cuối có dữ liệu
    }
  }

  // xử lý hiển thị
  if(last === 0){
    last = MIN   // không có dữ liệu → giữ 4 dàn
  }else{
    last = Math.min(MAX, last + 1) // có dữ liệu → mở thêm 1 dàn
  }

  // show/hide
  for(let i=1;i<=MAX;i++){
    const box = document.getElementById('gbox'+i)
    if(box){
      box.style.display = (i <= last) ? 'block' : 'none'
    }
  }
}
function clearG(){

  // xoá toàn bộ dàn
  for(let i=1;i<=MAX;i++){
    const el = document.getElementById('g'+i)
    if(el) el.value = ''
  }

  // xoá các input liên quan
  const ids = [
    'ghep_kq',
    'ghep_cham',
    'ghep_tong',
    'ghep_dau',
    'ghep_duoi',
    'ghep_bo',
    'ghep_them',
    'ghep_boSo'
  ]

  ids.forEach(id=>{
    const el = document.getElementById(id)
    if(el) el.value = ''
  })

  // xoá kết quả
  document.getElementById('gr').innerText = ''
  document.getElementById('gc').innerText = ''

  // ẩn nút
  const act = document.getElementById('gact')
  if(act) act.style.display = 'none'

  // xoá nút phụ
  document.getElementById('diffButtons').innerHTML = ''

  autoG()   // 🔥 bắt buộc để thu dàn
  save()
}
function generateDiffButtons(){

  const container = document.getElementById('diffButtons')
  if(!container) return

  container.innerHTML = ''

  let filled = []

  for(let i=1;i<=MAX;i++){
    const v = document.getElementById('g'+i)?.value.trim()
    if(v) filled.push(i)
  }

  if(filled.length < 2) return

  const a = filled[0]
  const b = filled[1]

  const btn1 = document.createElement('button')
  btn1.className = 'copy'
  btn1.innerText = `Dàn ${a} loại dàn ${b}`
  btn1.onclick = ()=> diffPair(a,b)

  const btn2 = document.createElement('button')
  btn2.className = 'copy'
  btn2.innerText = `Dàn ${b} loại dàn ${a}`
  btn2.onclick = ()=> diffPair(b,a)

  container.appendChild(btn1)
  container.appendChild(btn2)
}
function getDan(i){
  const v = document.getElementById('g'+i)?.value.trim()
  return v ? [...new Set(v.match(/\d{2}/g)||[])] : []
}

function diffPair(a,b){

  const A = getDan(a)
  const B = new Set(getDan(b))

  const result = A
  .filter(x=>!B.has(x))
  .map(x=>parseInt(x))
  .sort((a,b)=>a-b)
  .map(x=>x.toString().padStart(2,'0'))
  document.getElementById('gr').innerText = result.join(',')
  document.getElementById('gc').innerText =
    result.length ? result.length + ' số' : ''

  document.getElementById('gact').style.display =
    result.length ? 'flex' : 'none'

  save()
}

function getChemDan(){

  const raw = document.getElementById('chem_input').value || ''

  let nums = raw.match(/\d{2}/g) || []

  nums = [...new Set(nums)]
    .map(x=>parseInt(x))
    .sort((a,b)=>a-b)
    .map(x=>x.toString().padStart(2,'0'))

  return nums
}
function runChem(type){

  document.getElementById('chem_result').innerText = ''
  document.getElementById('chem_count').innerText = ''

  const base = getChemDan()
  let sizeInit = base.length

  if(sizeInit < 1){
    alert('Chưa có dàn')
    return
  }

  // xác định mức bắt đầu theo số lượng
  let startX = Math.floor(sizeInit / 10)

  if(startX > 9) startX = 9
  if(startX < 0) startX = 0

  let output = ''
  let lastCount = 0

  for(let x = startX; x >= 0; x--){

    // số giữ chuẩn 96→6
    let keep = 96 - (9 - x) * 10

    if(keep > base.length) keep = base.length
    if(keep < 1) keep = 1

    let r = []

    if(type === 'tren'){
      r = base.slice(0, keep)
    }

    else if(type === 'duoi'){
      r = base.slice(base.length - keep)
    }

    else if(type === 'hai'){
      let half = Math.floor(keep / 2)
      r = [
        ...base.slice(0, half),
        ...base.slice(base.length - (keep - half))
      ]
    }

    else if(type === 'giua'){
      let start = Math.floor((base.length - keep) / 2)
      r = base.slice(start, start + keep)
    }

    lastCount = r.length

    output += x + 'x (' + r.length + ' số)\n'
    output += r.join(',') + '\n\n'
  }

  document.getElementById('chem_result').innerText = output
  document.getElementById('chem_count').innerText = '0x còn ' + lastCount + ' số'
  document.getElementById('chem_actions').style.display = 'flex'

  save()
}
function taoDan(){

  document.getElementById('chem_result').innerText = ''
  document.getElementById('chem_count').innerText = ''

  const base = getChemDan()
  let sizeInit = base.length

  if(sizeInit < 1){
    alert('Chưa có dàn')
    return
  }

  // xác định mức bắt đầu theo số lượng dàn
  let startX = Math.floor(sizeInit / 10)

  if(startX > 9) startX = 9
  if(startX < 0) startX = 0

  // random dàn
  let randomDan = [...base]

  for(let i = randomDan.length - 1; i > 0; i--){
    let j = Math.floor(Math.random() * (i + 1))
    ;[randomDan[i], randomDan[j]] = [randomDan[j], randomDan[i]]
  }

  let output = ''

  for(let x = startX; x >= 0; x--){

    let keep = 96 - (9 - x) * 10

    if(keep > randomDan.length) keep = randomDan.length
    if(keep < 1) keep = 1

    let r = randomDan.slice(0, keep)

    let sortedDan = r
      .map(x=>parseInt(x))
      .sort((a,b)=>a-b)
      .map(x=>x.toString().padStart(2,'0'))

    output += x + 'x (' + sortedDan.length + ' số)\n'
    output += sortedDan.join(',') + '\n\n'
  }

  document.getElementById('chem_result').innerText = output
  document.getElementById('chem_count').innerText = '0x còn ' + (randomDan.length < 6 ? randomDan.length : 6) + ' số'
  document.getElementById('chem_actions').style.display = 'flex'

  save()
}

function createRandomDan(){

  const input = document.getElementById('random_count')
  let qty = parseInt(input.value)

  if(isNaN(qty) || qty <= 0){
    alert("Nhập số lượng")
    return
  }

  if(qty > 100) qty = 100

  let nums = []

  while(nums.length < qty){

    let n = Math.floor(Math.random()*100)
      .toString()
      .padStart(2,'0')

    if(!nums.includes(n)){
      nums.push(n)
    }

  }

  nums.sort((a,b)=>parseInt(a)-parseInt(b))

  document.getElementById('random_result').innerText = nums.join(',')
  document.getElementById('random_count_text').innerText = nums.length + ' số'

}
